<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ─── Primary SEO ─────────────────────────────────────────────────── -->
    <title>The Journey Association | Morocco Adventure & Cultural Journeys</title>
    <meta name="description" content="The Journey Association connects Morocco's clubs, events, and cultural activities. Discover festivals, book tickets, join clubs across Casablanca, Fez, Marrakech and more." />
    <meta name="keywords" content="Morocco clubs, Moroccan events, adventure Morocco, cultural activities Morocco, Fez club, Casablanca events, Marrakech activities, sustainable tourism Morocco, Morocco travel" />
    <meta name="author" content="The Journey Association" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://thejourney-ma.org/" />

    <!-- ─── Geo / Language ───────────────────────────────────────────────── -->
    <meta name="geo.region" content="MA" />
    <meta name="geo.placename" content="Morocco" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />

    <!-- ─── Open Graph (Facebook, LinkedIn, WhatsApp, Yandex) ───────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://thejourney-ma.org/" />
    <meta property="og:site_name" content="The Journey Association" />
    <meta property="og:title" content="The Journey Association | Morocco Adventure & Cultural Journeys" />
    <meta property="og:description" content="Experience Morocco's soul through sustainable journeys. Discover culture, embrace adventure, and create lasting connections with local communities." />
    <meta property="og:image" content="https://thejourney-ma.org/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="The Journey Association - Morocco Adventure & Cultural Journeys" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="fr_MA" />
    <meta property="og:locale:alternate" content="ar_MA" />

    <!-- ─── Twitter / X Card ────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@TheJourneyMA" />
    <meta name="twitter:creator" content="@TheJourneyMA" />
    <meta name="twitter:title" content="The Journey Association | Morocco Adventure & Cultural Journeys" />
    <meta name="twitter:description" content="Experience Morocco's soul through sustainable journeys. Discover culture, embrace adventure, and create lasting connections." />
    <meta name="twitter:image" content="https://thejourney-ma.org/og-image.jpg" />
    <meta name="twitter:image:alt" content="The Journey Association Morocco" />

    <!-- ─── Google Search Console Verification ──────────────────────────── -->
    <meta name="google-site-verification" content="REPLACE_WITH_GOOGLE_VERIFICATION_TOKEN" />

    <!-- ─── Bing / Yahoo Webmaster Verification ─────────────────────────── -->
    <meta name="msvalidate.01" content="REPLACE_WITH_BING_VERIFICATION_TOKEN" />

    <!-- ─── Yandex Webmaster Verification ───────────────────────────────── -->
    <meta name="yandex-verification" content="REPLACE_WITH_YANDEX_VERIFICATION_TOKEN" />

    <!-- ─── Structured Data / JSON-LD (Google Rich Results) ─────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "The Journey Association",
      "url": "https://thejourney-ma.org",
      "logo": "https://thejourney-ma.org/logo-atj.png",
      "description": "Morocco's premier platform for adventure, cultural journeys, sports clubs, and community experiences.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "MA",
        "addressRegion": "Morocco"
      },
      "sameAs": [
        "https://www.facebook.com/TheJourneyAssociation",
        "https://www.instagram.com/TheJourneyAssociation",
        "https://twitter.com/TheJourneyMA"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "availableLanguage": ["English", "French", "Arabic"]
      }
    }
    </script>

    <!-- ─── Website Search Action (Google Sitelinks Searchbox) ──────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "https://thejourney-ma.org/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://thejourney-ma.org/discover?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ─── Favicons ─────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#1a4a3a" />

    <!-- ─── Performance / Preconnect ────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
